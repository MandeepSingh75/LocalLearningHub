<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Learning Hub</title>
    <style>
        :root { --primary: #1A2B3C; --accent: #8DAA91; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: #333; margin: 0; padding: 0; }
        header { background: var(--primary); color: white; padding: 3rem 1rem; text-align: center; }
        .container { max-width: 800px; margin: -2rem auto 2rem; padding: 0 1rem; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 2rem; }
        .tag { background: var(--accent); color: white; padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.8rem; text-transform: uppercase; }
        h1 { margin: 0; font-size: 2.5rem; }
        h2 { color: var(--primary); margin-top: 0; }
        .date { color: #888; font-size: 0.9rem; display: block; margin-bottom: 0.5rem; }
    </style>
</head>
<body>
    <header>
        <h1>Local Learning Hub</h1>
        <p>Documenting the daily "Aha!" moments.</p>
    </header>
    <div class="container">
        <div class="card">
            <span class="date">March 1, 2026</span>
            <h2>Entry 001: Building the Foundation</h2>
            <p>Today I successfully set up my custom domain and hosted this site on GitHub. Learning the mechanics of DNS and A-records was the first big win for the Hub.</p>
            <span class="tag">Web Dev</span>
            <span class="tag">Systems</span>
        </div>
    </div>
</body>
</html>
